model:
  name: vit_small_patch16_224
  num_classes: 3
  pretrained: false          # we load SiT weights manually
  img_size: 224
  drop_rate: 0.1

data:
  plane: sagittal            # axial | coronal | sagittal
  slices_per_volume: 2       # number of 2D slices extracted per 3D MRI volume
  tuning_split_ratio: 0.0    # set > 0 to carve out part of train for hyperparameter tuning
  # Paths — Colab reads from Drive, local reads from ./data
  colab_root: /content/drive/MyDrive/knee-abnormality-vit/data/MRNet-v1.0
  local_root: ./data/MRNet-v1.0
  num_workers: 2

training:
  seed: 42
  epochs: 50
  batch_size: 32
  # Differential learning rates: low for backbone, high for head
  backbone_lr: 1.0e-5
  head_lr: 1.0e-4
  weight_decay: 1.0e-4
  warmup_epochs: 5
  early_stopping_patience: 10
  loss:
    use_class_weights: true
    label_smoothing: 0.05

output:
  colab_output: /content/drive/MyDrive/knee-abnormality-vit/outputs
  local_output: ./outputs
